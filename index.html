<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: white;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
      z-index: 10;
    }

    button {
      font-size: 24px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<model-viewer
  id="viewer"
  src="model.glb"
  ar
  camera-controls
  auto-rotate>
</model-viewer>

<div class="controls">
  <button onclick="prev()">⬅️</button>
  <button onclick="next()">➡️</button>
</div>

<script>
const models = ["model.glb", "model2.glb", "model3.glb", "model4.glb", "model5.glb"];
let index = 0;

const viewer = document.getElementById("viewer");

function update() {
  viewer.src = models[index];
}

function next() {
  index = (index + 1) % models.length;
  update();
}

function prev() {
  index = (index - 1 + models.length) % models.length;
  update();
}
</script>

</body>
</html>
